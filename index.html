<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker Tool</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  .preview {
    height: 100px;
    border-radius: 10px;
    margin: 15px 0;
    border: 1px solid #ccc;
  }

  input, button {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    cursor: pointer;
    background: #333;
    color: white;
  }

  .history {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
  }

  .swatch {
    width: 25px;
    height: 25px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid #ddd;
  }

  .error {
    color: red;
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Color Picker Tool</h2>

  <!-- Color Input -->
  <input type="color" id="colorPicker">

  <!-- Preview -->
  <div class="preview" id="preview"></div>

  <!-- HEX -->
  <input type="text" id="hexInput" placeholder="#FFFFFF">
  <button onclick="copyText('hexInput')">Copy HEX</button>

  <!-- RGB -->
  <input type="text" id="rgbInput" placeholder="rgb(255,255,255)">
  <button onclick="copyText('rgbInput')">Copy RGB</button>

  <div class="error" id="error"></div>

  <!-- History -->
  <div class="history" id="history"></div>
  <button onclick="clearHistory()">Clear History</button>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const picker = document.getElementById("colorPicker");
const preview = document.getElementById("preview");
const hexInput = document.getElementById("hexInput");
const rgbInput = document.getElementById("rgbInput");
const error = document.getElementById("error");
const historyDiv = document.getElementById("history");

let history = [];

/* HEX → RGB */
function hexToRgb(hex) {
  hex = hex.replace("#", "");

  if (hex.length === 3) {
    hex = hex.split('').map(x => x + x).join('');
  }

  const bigint = parseInt(hex, 16);
  if (isNaN(bigint)) return null;

  return {
    r: (bigint >> 16) & 255,
    g: (bigint >> 8) & 255,
    b: bigint & 255
  };
}

/* RGB → HEX */
function rgbToHex(r, g, b) {
  return "#" + [r, g, b]
    .map(x => x.toString(16).padStart(2, '0'))
    .join('')
    .toUpperCase();
}

/* Update UI */
function updateColor(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return;

  const rgbStr = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;

  preview.style.background = hex;
  hexInput.value = hex.toUpperCase();
  rgbInput.value = rgbStr;

  addToHistory(hex);
}

/* Picker Event */
picker.addEventListener("input", e => {
  updateColor(e.target.value);
});

/* HEX Manual Input */
hexInput.addEventListener("input", () => {
  let val = hexInput.value.trim();

  if (!val.startsWith("#")) val = "#" + val;

  if (/^#([0-9A-F]{3}|[0-9A-F]{6})$/i.test(val)) {
    error.textContent = "";
    updateColor(val);
  } else {
    error.textContent = "Invalid HEX format";
  }
});

/* RGB Manual Input */
rgbInput.addEventListener("input", () => {
  const match = rgbInput.value.match(/\d+/g);

  if (!match || match.length !== 3) {
    error.textContent = "Invalid RGB format";
    return;
  }

  let [r, g, b] = match.map(Number);

  if (r > 255 || g > 255 || b > 255 || r < 0 || g < 0 || b < 0) {
    error.textContent = "RGB range: 0–255";
    return;
  }

  error.textContent = "";

  const hex = rgbToHex(r, g, b);
  updateColor(hex);
});

/* Copy */
function copyText(id) {
  const text = document.getElementById(id).value;

  if (!navigator.clipboard) {
    alert("Clipboard not supported");
    return;
  }

  navigator.clipboard.writeText(text)
    .then(() => showToast())
    .catch(() => alert("Copy failed"));
}

/* Toast */
function showToast() {
  const toast = document.getElementById("toast");
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 1500);
}

/* History */
function addToHistory(color) {
  if (history.includes(color)) return;

  history.unshift(color);
  if (history.length > 20) history.pop();

  renderHistory();
}

function renderHistory() {
  historyDiv.innerHTML = "";
  history.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.background = color;
    swatch.onclick = () => updateColor(color);
    historyDiv.appendChild(swatch);
  });
}

function clearHistory() {
  history = [];
  renderHistory();
}

/* Default Load */
updateColor("#000000");
</script>

</body>
</html>
